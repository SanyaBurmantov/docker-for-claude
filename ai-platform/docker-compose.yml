services:
  proxy-gateway:
    build: ./proxy-gateway
    image: ai-proxy-gateway
    container_name: ai-gateway
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "9901:6080"
    environment:
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASS=${PROXY_PASS}
    networks:
      - proxy-net
    healthcheck:
      # kill switch rules present AND redsocks listening on 12345 (0x3039)
      test: ["CMD-SHELL", "iptables -t nat -S OUTPUT | grep -q REDSOCKS && grep -q ':3039' /proc/net/tcp"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  claude-container:
    build:
      context: ./claude-container
      # Baked into the image, not set at runtime: the `claude` user must already own
      # its home directory when the container starts. Change HOST_UID/HOST_GID and you
      # must rebuild, not just restart.
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: ai-claude
    container_name: ai-claude
    network_mode: "service:proxy-gateway"
    depends_on:
      proxy-gateway:
        condition: service_healthy
    environment:
      - HTTP_PROXY=http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}
      - HTTPS_PROXY=http://${PROXY_USER}:${PROXY_PASS}@${PROXY_HOST}:${PROXY_PORT}
      - NO_PROXY=localhost,127.0.0.1
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL:-qwen-max}
    volumes:
      - ${PROJECTS_DIR}:/workspace
      - claude-auth:/home/claude/.claude
      # opencode splits state the same way Claude Code does: provider tokens and
      # sessions under the data dir, opencode.json under the config dir.
      - opencode-data:/home/claude/.local/share/opencode
      - opencode-config:/home/claude/.config/opencode
    stdin_open: true
    tty: true
    restart: unless-stopped

  browser-container:
    build: ./browser-container
    image: ai-browser
    container_name: ai-browser
    network_mode: "service:proxy-gateway"
    depends_on:
      proxy-gateway:
        condition: service_healthy
    environment:
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT}
      - VNC_PASSWORD=${VNC_PASSWORD:-claude}
    volumes:
      - browser-profile:/home/claude/.mozilla
      - browser-config:/home/claude/.config
    stdin_open: true
    tty: true
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: ai-backend
    container_name: ai-backend
    # Runs as the host user so files it writes into /workspace stay editable outside
    # Docker. That costs it root's free pass to /var/run/docker.sock, so it has to
    # join the host's docker group explicitly.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    group_add:
      - "${DOCKER_GID:?set DOCKER_GID in .env — run: getent group docker | cut -d: -f3}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_DIR}:/workspace
      # Favourites, last-opened times and the agent picked per project. Not part
      # of any project, so it must not live in PROJECTS_DIR.
      - platform-data:/data
    environment:
      - PORT=3000
      - CLAUDE_CONTAINER=ai-claude
      - BROWSER_CONTAINER=ai-browser
      - DATA_DIR=/data
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
      - EXPLAIN_MODEL=${EXPLAIN_MODEL:-sonnet}
      - EXPLAIN_TIMEOUT_MS=${EXPLAIN_TIMEOUT_MS:-120000}
      - REVIEW_MODEL=${REVIEW_MODEL:-sonnet}
      - REVIEW_TIMEOUT_MS=${REVIEW_TIMEOUT_MS:-240000}
      - COMMIT_MESSAGE_MODEL=${COMMIT_MESSAGE_MODEL:-sonnet}
      - COMMIT_MESSAGE_TIMEOUT_MS=${COMMIT_MESSAGE_TIMEOUT_MS:-90000}
      # backend sits on app-net with direct egress, so unlike the claude/browser
      # containers it is not transparently proxied — it dials the proxy itself
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASS=${PROXY_PASS}
    depends_on:
      claude-container:
        condition: service_started
      browser-container:
        condition: service_started
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: ai-frontend
    container_name: ai-frontend
    environment:
      - UI_USER=${UI_USER:-admin}
      - UI_PASSWORD=${UI_PASSWORD:-}
    ports:
      - "9900:80"
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

volumes:
  claude-auth:
    driver: local
  opencode-data:
    driver: local
  opencode-config:
    driver: local
  platform-data:
    driver: local
  browser-profile:
    driver: local
  browser-config:
    driver: local

networks:
  proxy-net:
    driver: bridge
  app-net:
    driver: bridge
