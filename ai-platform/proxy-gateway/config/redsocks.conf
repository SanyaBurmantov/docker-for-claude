base {
    log_debug = off;
    log_info = on;
    log = stderr;
    daemon = off;
    redirector = iptables;
}

redsocks {
    local_ip = 127.0.0.1;
    local_port = 12345;
    ip = PROXY_HOST_PLACEHOLDER;
    port = PROXY_PORT_PLACEHOLDER;
    type = http-connect;
    login = "PROXY_USER_PLACEHOLDER";
    password = "PROXY_PASS_PLACEHOLDER";
}
