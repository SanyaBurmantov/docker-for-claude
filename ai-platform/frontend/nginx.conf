server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Without this nginx serves text/* and JS with no charset, leaving non-ASCII
    # string literals in the bundle to the browser's encoding guess
    charset utf-8;

    # Empty unless UI_PASSWORD is set (see auth-setup.sh)
    include /etc/nginx/auth.conf;

    client_max_body_size 100m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
