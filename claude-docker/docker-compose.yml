services:
  claude-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-env
    hostname: claude-box
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    ports:
      - "6080:6080"
    environment:
      - PROXY_HOST=${PROXY_HOST}
      - PROXY_PORT=${PROXY_PORT}
      - PROXY_USER=${PROXY_USER}
      - PROXY_PASS=${PROXY_PASS}
      - VNC_PASSWORD=${VNC_PASSWORD:-claude}
      - DISPLAY=:0
      - TZ=UTC
    volumes:
      - claude-auth:/home/claude/.claude
      - claude-browser:/home/claude/.mozilla
      - claude-config:/home/claude/.config
      - claude-workspace:/workspace
      - ~/projects:/workspace/host-projects:ro
    restart: unless-stopped
    stdin_open: true
    tty: true
    dns:
      - 1.1.1.1
      - 8.8.8.8

volumes:
  claude-auth:
    driver: local
  claude-browser:
    driver: local
  claude-config:
    driver: local
  claude-workspace:
    driver: local
